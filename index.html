<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronómetro Glassmorphism</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;

      --glass:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.15);

      --primary:#00d4ff;
      --warning:#ffd000;
      --danger:#ff3b5f;

      --text:#fff;
      --text2:rgba(255,255,255,.7);
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at top left,#1e40af 0%,transparent 30%),
        radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      padding:20px;
    }

    .blur{
      position:absolute;
      width:300px;
      height:300px;
      border-radius:50%;
      filter:blur(100px);
      opacity:.3;
      animation:float 7s ease-in-out infinite alternate;
    }

    .blur.one{
      background:#00d4ff;
      top:-80px;
      left:-80px;
    }

    .blur.two{
      background:#ff00d4;
      bottom:-100px;
      right:-80px;
      animation-delay:2s;
    }

    @keyframes float{
      from{ transform:translateY(0px) translateX(0px);}
      to{ transform:translateY(20px) translateX(20px);}
    }

    .app{
      width:100%;
      max-width:480px;
      position:relative;
      z-index:2;
    }

    .card{
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:30px;
      padding:30px;
      box-shadow:
        0 10px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.06);
      transition:.25s ease;
    }

    .title{
      text-align:center;
      font-size:1.1rem;
      color:var(--text2);
      margin-bottom:25px;
      letter-spacing:.5px;
    }

    .timer-wrapper{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:30px;
    }

    .ring{
      width:260px;
      height:260px;
      border-radius:50%;
      position:absolute;
      background:
        conic-gradient(
          var(--primary) 0deg,
          rgba(255,255,255,.08) 0deg
        );
      transition:background .2s linear, box-shadow .25s ease;
      box-shadow:0 0 40px rgba(0,212,255,.25);
    }

    .ring.warning{
      box-shadow:0 0 40px rgba(255,208,0,.35);
    }

    .ring.danger{
      box-shadow:0 0 50px rgba(255,59,95,.45);
    }

    .inner{
      width:225px;
      height:225px;
      border-radius:50%;
      background:rgba(10,15,30,.7);
      backdrop-filter:blur(15px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      border:1px solid rgba(255,255,255,.08);
      z-index:2;
    }

    .time{
      font-size:3.2rem;
      font-weight:700;
      letter-spacing:2px;
      transition:.2s ease;
      font-variant-numeric:tabular-nums;
    }

    .milliseconds{
      font-size:1.2rem;
      color:var(--text2);
      margin-top:4px;
      letter-spacing:1px;
      font-variant-numeric:tabular-nums;
    }

    .controls{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:25px;
    }

    button{
      border:none;
      outline:none;
      padding:14px;
      border-radius:18px;
      cursor:pointer;
      font-size:.95rem;
      font-weight:600;
      color:white;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      transition:.18s ease;
      backdrop-filter:blur(10px);
    }

    button:hover{
      transform:translateY(-2px) scale(1.02);
      background:rgba(255,255,255,.13);
    }

    button:active{
      transform:scale(.96);
    }

    .start{
      background:linear-gradient(135deg,#00d4ff,#006eff);
    }

    .pause{
      background:linear-gradient(135deg,#ffb300,#ff7a00);
    }

    .reset{
      background:linear-gradient(135deg,#ff4d6d,#c9184a);
    }

    .settings{
      margin-top:5px;
      display:grid;
      gap:14px;
    }

    .setting-box{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      border-radius:18px;
      padding:14px;
    }

    .setting-box label{
      display:block;
      font-size:.9rem;
      margin-bottom:8px;
      color:var(--text2);
    }

    .setting-box input{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:white;
      border-radius:12px;
      padding:12px;
      outline:none;
      font-size:1rem;
    }

    .status{
      margin-top:18px;
      text-align:center;
      font-size:.95rem;
      font-weight:600;
      transition:.25s ease;
      min-height:20px;
    }

    .warning-text{
      color:var(--warning);
    }

    .danger-text{
      color:var(--danger);
    }

    @media(max-width:500px){
      .time{
        font-size:2.6rem;
      }

      .ring{
        width:230px;
        height:230px;
      }

      .inner{
        width:195px;
        height:195px;
      }

      .controls{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="blur one"></div>
  <div class="blur two"></div>

  <div class="app">
    <div class="card">

      <div class="title">
        Cronómetro Precision Glass
      </div>

      <div class="timer-wrapper">

        <div class="ring" id="ring"></div>

        <div class="inner">
          <div class="time" id="time">
            00:00
          </div>

          <div class="milliseconds" id="milliseconds">
            .000
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="start" id="startBtn">
          Iniciar
        </button>

        <button class="pause" id="pauseBtn">
          Pausar
        </button>

        <button class="reset" id="resetBtn">
          Reiniciar
        </button>
      </div>

      <div class="settings">

        <div class="setting-box">
          <label>
            Tiempo de advertencia (amarillo) en segundos
          </label>

          <input
            type="number"
            id="warningInput"
            min="1"
            value="35"
          />
        </div>

        <div class="setting-box">
          <label>
            Tiempo crítico (rojo) en segundos
          </label>

          <input
            type="number"
            id="dangerInput"
            min="1"
            value="60"
          />
        </div>

      </div>

      <div class="status" id="status"></div>

    </div>
  </div>

  <script>
    const timeEl = document.getElementById('time');
    const msEl = document.getElementById('milliseconds');

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    const warningInput = document.getElementById('warningInput');
    const dangerInput = document.getElementById('dangerInput');

    const ring = document.getElementById('ring');
    const statusEl = document.getElementById('status');

    let startTime = 0;
    let elapsed = 0;
    let interval = null;
    let running = false;

    function formatTime(ms){

      const minutes = Math.floor(ms / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      const milliseconds = ms % 1000;

      timeEl.textContent =
        `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

      msEl.textContent =
        `.${String(milliseconds).padStart(3,'0')}`;
    }

    function updateRing(seconds){

      const progress = (seconds % 60) * 6;

      let color = 'var(--primary)';

      const warning = Number(warningInput.value);
      const danger = Number(dangerInput.value);

      ring.classList.remove('warning','danger');
      statusEl.className = 'status';

      timeEl.style.color = 'white';

      if(seconds >= danger){

        color = 'var(--danger)';

        ring.classList.add('danger');

        statusEl.textContent = 'Tiempo crítico';
        statusEl.classList.add('danger-text');

        timeEl.style.color = 'var(--danger)';

      } else if(seconds >= warning){

        color = 'var(--warning)';

        ring.classList.add('warning');

        statusEl.textContent = 'Advertencia';
        statusEl.classList.add('warning-text');

        timeEl.style.color = 'var(--warning)';

      } else {

        statusEl.textContent = 'En progreso';
      }

      ring.style.background = `
        conic-gradient(
          ${color} ${progress}deg,
          rgba(255,255,255,.08) ${progress}deg
        )
      `;
    }

    function update(){

      elapsed = Date.now() - startTime;

      formatTime(elapsed);

      const seconds = elapsed / 1000;

      updateRing(seconds);
    }

    startBtn.onclick = () => {

      if(running) return;

      running = true;

      startTime = Date.now() - elapsed;

      interval = setInterval(update, 10);
    };

    pauseBtn.onclick = () => {

      running = false;

      clearInterval(interval);
    };

    resetBtn.onclick = () => {

      running = false;

      clearInterval(interval);

      elapsed = 0;

      formatTime(0);

      ring.style.background = `
        conic-gradient(
          var(--primary) 0deg,
          rgba(255,255,255,.08) 0deg
        )
      `;

      ring.classList.remove('warning','danger');

      statusEl.textContent = '';

      timeEl.style.color = 'white';
    };

    formatTime(0);
  </script>

</body>
    </html>
